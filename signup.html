<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup OTP</title>
</head>
<body>

<h2>Signup Form</h2>

<form id="signupForm">
    <input type="text" id="user_id" placeholder="User ID" required><br><br>
    <input type="email" id="email" placeholder="Email" required><br><br>
    <input type="password" id="password" placeholder="Password" required><br><br>

    <button type="submit">Send OTP</button>
</form>

<br>

<div id="otpSection" style="display:none;">
    <h3>Verify OTP</h3>

    <p id="timerText">OTP valid for: 120s</p>

    <input type="text" id="otp" placeholder="Enter OTP"><br><br>

    <button onclick="verifyOTP()">Verify</button>
    <button id="resendBtn" onclick="resendOTP()" disabled>Resend OTP</button>
</div>

<p id="msg"></p>

<script>

let timer = 120;
let interval;

// ---------- TIMER ----------
function startTimer() {
    timer = 120;
    document.getElementById("resendBtn").disabled = true;

    interval = setInterval(() => {
        timer--;

        document.getElementById("timerText").innerText =
            "OTP valid for: " + timer + "s";

        if (timer <= 0) {
            clearInterval(interval);
            document.getElementById("timerText").innerText =
                "OTP expired ❌";
            document.getElementById("resendBtn").disabled = false;
        }
    }, 1000);
}

// ---------- SIGNUP ----------
document.getElementById("signupForm").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch("/signup", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `user_id=${user_id.value}&email=${email.value}&password=${password.value}`
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("msg").innerText = data.msg;
        document.getElementById("otpSection").style.display = "block";
        startTimer();
    });
});

// ---------- VERIFY ----------
function verifyOTP() {
    fetch("/verify", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `otp=${otp.value}`
    })
    .then(res => {
        if (res.redirected) window.location.href = res.url;
        else return res.text();
    })
    .then(data => {
        if (data) document.getElementById("msg").innerText = data;
    });
}

// ---------- RESEND ----------
function resendOTP() {
    fetch("/resend-otp", { method: "POST" })
    .then(res => res.json())
    .then(data => {
        document.getElementById("msg").innerText = data.msg;
        clearInterval(interval);
        startTimer();
    });
}

</script>

</body>
</html>
